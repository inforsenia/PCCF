name: Resumen de Estado

on:
  push:
    paths:
      - UP/**/*

permissions:
  contents: write

jobs:
  resumen-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Crear resumen de estado y actualizar repositorio
        run: |
          set -e
          if [ ! -f "./tools/status.sh" ]; then
            echo "Error: tools/status.sh no encontrado" >&2
            exit 1
          fi

          chmod +x ./tools/status.sh
          ./tools/status.sh

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add UP/STATUS_SUMMARY.md
          git commit -m "[resumen] Actualizar resumen de estado" || echo "No changes to commit"
          git push origin HEAD:$GITHUB_REF_NAME
